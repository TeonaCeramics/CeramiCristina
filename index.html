<!DOCTYPE html>-
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CERAMICRISTINA</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      text-align: center;
    }

    /* FUNDAL + BLUR */
    .background {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background-image: url('fundal.jpg');
      background-size: cover;
      background-position: center;
      z-index: -2;
    }

    .background-blur {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(8px);
      background-color: rgba(0,0,0,0.4);
      z-index: -1;
    }

    .content {
      padding: 40px 20px;
    }

    img.logo {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 2px solid white;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    h2 {
      font-size: 18px;
      margin-top: 0;
      margin-bottom: 30px;
      font-weight: normal;
    }

    .button {
      display: block;
      margin: 15px auto;
      padding: 14px 24px;
      font-size: 18px;
      border-radius: 8px;
      width: 80%;
      max-width: 300px;
      text-decoration: none;
      color: white;
      border: 1px solid white;
    }

    .fb { background-color: #4267B2; }
    .ig { background-color: #E1306C; }
    .threads { background-color: #000000; }
    .gallery-btn { background-color: #555; }

    .email {
      margin-top: 40px;
      font-size: 16px;
      color: #ddd;
    }

    .gallery {
      display: none;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 30px;
      gap: 15px;
    }

    .gallery img {
      width: 180px;
      border-radius: 10px;
      border: 1px solid white;
    }
  </style>

  <script>
    function toggleGallery() {
      const gallery = document.getElementById('gallery');
      gallery.style.display = gallery.style.display === 'flex' ? 'none' : 'flex';
    }
  </script>
</head>
<body>

  <div class="background"></div>
  <div class="background-blur"></div>

  <div class="content">

    <img src="logo-cristina.jpeg" class="logo" alt="Logo CeramiCristina" />

    <h1>CERAMICRISTINA</h1>
    <h2>by Cristina Ciobanu</h2>

    <a class="button fb" href="https://www.facebook.com/share/1AGAtVEN5T/?mibextid=LQQJ4d" target="_blank">Facebook</a>
    <a class="button ig" href="https://www.instagram.com/ceramicristina?igsh=bHFiYzd0dTlpOWVn&utm_source=qr" target="_blank">Instagram</a>
    <a class="button threads" href="https://www.threads.com/@ceramicristina?igshid=NTc4MTIwNjQ2YQ==" target="_blank">Threads</a>
    <a class="button gallery-btn" onclick="toggleGallery()">Galerie foto</a>

    <div class="email">
      📩 <a href="mailto:ceramicristina@gmail.com" style="color:white;">ceramicristina@gmail.com</a>
    </div>

    <div id="gallery" class="gallery">
      <img src="galerie1.jpg" alt="Foto 1" />
      <img src="galerie2.jpg" alt="Foto 2" />
      <img src="galerie3.jpg" alt="Foto 3" />
      <img src="galerie4.jpg" alt="Foto 4" />
      <img src="galerie5.jpg" alt="Foto 5" />
      <img src="galerie6.jpg" alt="Foto 6" />
      <img src="galerie7.jpg" alt="Foto 7" />
      <img src="galerie8.jpg" alt="Foto 8" />
      <img src="galerie9.jpg" alt="Foto 9" />
      <img src="galerie10.jpg" alt="Foto 10" />
      <img src="galerie11.jpg" alt="Foto 11" />
      <img src="galerie12.jpg" alt="Foto 12" />
      <img src="galerie13.jpg" alt="Foto 13" />
      <img src="galerie14.jpg" alt="Foto 14" />
      <img src="galerie15.jpg" alt="Foto 15" />
      <img src="galerie16.jpg" alt="Foto 16" />
      <img src="galerie17.jpg" alt="Foto 17" />
      <img src="galerie18.jpg" alt="Foto 18" />
      <img src="galerie19.jpg" alt="Foto 19" />
      <img src="galerie20.jpg" alt="Foto 20" />
    </div>

  </div>

</body>
</html>
